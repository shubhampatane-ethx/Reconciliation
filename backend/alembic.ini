[alembic]
# Path to migration scripts.
script_location = alembic

# Template used to generate migration file names.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for the "created date" in new revision files.
timezone = UTC

# Max length of characters to apply to the "slug" field.
truncate_slug_length = 40

# sys.path additions so `alembic/env.py` can `import database`, `import models`.
prepend_sys_path = .

# Version path separator.
version_path_separator = os

# The actual DB URL is set at runtime in alembic/env.py from
# database.DATABASE_URL (which itself reads DATABASE_URL /
# POSTGRES_HOST / POSTGRES_PORT / POSTGRES_DB / POSTGRES_USER /
# POSTGRES_PASSWORD from the environment). Nothing needs to be
# hardcoded here — this placeholder is overridden in env.py.
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
